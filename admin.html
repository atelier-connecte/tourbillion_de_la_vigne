<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Restaurant · Le Tourbillon de la Vigne</title>
    <link rel="icon" type="image/jpeg" href="assets/logo_atelier.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&family=Josefin+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("AO-oBPw9GC0Lc9cQZ");
        })();
    </script>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <div class="header-brand">
                <img src="https://static.wixstatic.com/media/c1ad2d_62af044ca80b41b68fd5f8463fed5e68~mv2.png" alt="Le Tourbillon de la Vigne" class="header-logo">
                <div class="header-title">
                    <h1>Le Tourbillon de la Vigne</h1>
                    <p>Espace Restaurant</p>
                </div>
            </div>
            <div class="header-info">
                <div class="current-date" id="currentDate"></div>
                <span class="today-badge" id="todayBadge">0 réservations aujourd'hui</span>
            </div>
        </div>
    </header>

    <div class="stats-bar">
        <div class="stats-content">
            <div class="stat-card">
                <div class="stat-value" id="totalCouverts">0</div>
                <div class="stat-label">Couverts du jour</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="nextService">—</div>
                <div class="stat-label">Prochain service</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingCount">0</div>
                <div class="stat-label">En attente</div>
            </div>
        </div>
    </div>

    <nav class="admin-tabs">
        <button class="admin-tab active" data-tab="reservations">Réservations</button>
        <button class="admin-tab" data-tab="carte">Carte des menus</button>
        <button class="admin-tab" data-tab="capacites">Capacités</button>
    </nav>

    <main class="main-content">
        <div id="tabReservations" class="tab-content active">
        <div class="section-header">
            <h2 class="section-title" id="sectionTitle">Réservations du jour</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Toutes</button>
                <button class="filter-btn" data-filter="lunch">Déjeuner</button>
                <button class="filter-btn" data-filter="dinner">Dîner</button>
            </div>
        </div>

        <button class="btn-secondary" onclick="deleteCancelledReservations()">🗑️ Supprimer les réservations annulées</button>

        <div class="reservations-grid" id="reservationsGrid">
            <!-- Les réservations seront injectées ici par JavaScript -->
        </div>

        <div class="calendar-section">
            <h3 class="calendar-title">Semaine en cours</h3>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Le calendrier sera injecté ici par JavaScript -->
            </div>
        </div>

        <a href="index.html" class="back-link">← Retour au site</a>
        </div>

        <div id="tabCarte" class="tab-content">
            <div class="section-header">
                <h2 class="section-title">Éditeur de la carte</h2>
                <button class="btn-primary" id="saveMenuBtn">💾 Sauvegarder la carte</button>
            </div>
            
            <div id="menuEditor" class="menu-editor">
                <!-- L'éditeur sera injecté ici par JavaScript -->
            </div>
            
            <button class="btn-secondary" id="addCategoryBtn">+ Ajouter une catégorie</button>
        </div>

        <div id="tabCapacites" class="tab-content">
            <div class="section-header">
                <h2 class="section-title">Gestion des capacités</h2>
            </div>
            
            <div class="capacity-section">
                <h3 class="capacity-subtitle">Capacité par défaut</h3>
                <div class="capacity-default">
                    <div class="capacity-input-group">
                        <label for="defaultLunch">Déjeuner (couverts)</label>
                        <input type="number" id="defaultLunch" min="0" value="15">
                    </div>
                    <div class="capacity-input-group">
                        <label for="defaultDinner">Dîner (couverts)</label>
                        <input type="number" id="defaultDinner" min="0" value="15">
                    </div>
                </div>
            </div>
            
            <div class="capacity-section">
                <h3 class="capacity-subtitle">Capacités spécifiques par date</h3>
                <div class="capacity-specific">
                    <div class="capacity-add-form">
                        <input type="date" id="specificDate" placeholder="Date">
                        <input type="number" id="specificLunch" min="0" placeholder="Déjeuner">
                        <input type="number" id="specificDinner" min="0" placeholder="Dîner">
                        <button class="btn-primary" id="addSpecificCapacityBtn">+ Ajouter</button>
                    </div>
                    <div id="specificCapacitiesList" class="specific-capacities-list">
                        <!-- Liste des capacités spécifiques -->
                    </div>
                </div>
            </div>
            
            <button class="btn-primary btn-large" id="saveCapacitiesBtn">💾 Sauvegarder les capacités</button>
        </div>
    </main>

    <script src="admin.js"></script>
</body>
</html>
